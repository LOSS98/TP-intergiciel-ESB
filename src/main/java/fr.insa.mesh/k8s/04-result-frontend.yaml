---
# ServiceAccount dédié
apiVersion: v1
kind: ServiceAccount
metadata:
  name: result-frontend
  namespace: labotrack

---
# Deployment result-frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-frontend
  namespace: labotrack
  labels:
    app: result-frontend
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-frontend
  template:
    metadata:
      labels:
        app: result-frontend
        version: "1.0"
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: result-frontend
      containers:
        - name: result-frontend
          image: labotrack/result-frontend:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SAMPLE_API_URL
              value: http://sample-api:8080
            - name: ANALYSIS_API_URL
              value: http://analysis-api:8081
          readinessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8082
            initialDelaySeconds: 35
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# Service result-frontend (NodePort pour accès depuis l'hôte via minikube service)
apiVersion: v1
kind: Service
metadata:
  name: result-frontend
  namespace: labotrack
  labels:
    app: result-frontend
spec:
  type: NodePort
  selector:
    app: result-frontend
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      nodePort: 30082
