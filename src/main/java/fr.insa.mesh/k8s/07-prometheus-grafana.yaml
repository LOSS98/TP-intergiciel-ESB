---
# ─────────────────────────────────────────────────────────────────────────────
# Stack d'observation optionnelle : Prometheus + Grafana
# (Point 7 du sujet – optionnel)
# À déployer après avoir installé Linkerd viz.
# ─────────────────────────────────────────────────────────────────────────────

# ConfigMap contenant la configuration Prometheus minimale pour scraper Linkerd
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: labotrack
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape des proxies Linkerd (métriques des sidecars)
      - job_name: 'linkerd-proxy'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['labotrack']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: keep
            regex: linkerd-proxy
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:4191
            target_label: __address__

      # Scrape des applications Spring Boot (Actuator si disponible)
      - job_name: 'labotrack-services'
        static_configs:
          - targets:
              - 'sample-api:8080'
              - 'analysis-api:8081'
              - 'result-frontend:8082'

---
# Deployment Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: labotrack
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=1h"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config

---
# Service Prometheus
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: labotrack
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

---
# Deployment Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: labotrack
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
      annotations:
        linkerd.io/inject: enabled
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---
# Service Grafana (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: labotrack
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
