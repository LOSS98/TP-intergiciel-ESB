---
# Secret PostgreSQL
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: labotrack
type: Opaque
stringData:
  POSTGRES_DB: labotrack
  POSTGRES_USER: labotrack
  POSTGRES_PASSWORD: labotrack123

---
# PersistentVolumeClaim pour les données PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: labotrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: labotrack
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        # PostgreSQL n'est pas maillé (pas de sidecar Linkerd)
        linkerd.io/inject: disabled
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "labotrack", "-d", "labotrack"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# Service PostgreSQL (ClusterIP interne)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: labotrack
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
