version: '3.8'

# docker-compose du service démonstrateur (Étape 1 - Docker Build)
# Utilise le Dockerfile multistage : aucune compilation locale requise.

services:
  demo-service:
    build:
      context: .
      dockerfile: Dockerfile.multistage
    image: demo-service:1.0
    container_name: demo-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/monservice/echo/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
