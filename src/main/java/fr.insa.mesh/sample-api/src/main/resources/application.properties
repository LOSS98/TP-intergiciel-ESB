spring.application.name=sample-api
server.port=8080
grpc.server.port=${GRPC_PORT:9090}

# ── Base de données ──────────────────────────────────────────────────────────
# Par défaut : H2 en mémoire (développement local / docker-compose sans PostgreSQL)
# Ces valeurs sont surchargées par des variables d'environnement en Kubernetes.
spring.datasource.url=${DB_URL:jdbc:h2:mem:labotrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console H2 (désactivée en prod via env var)
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console
