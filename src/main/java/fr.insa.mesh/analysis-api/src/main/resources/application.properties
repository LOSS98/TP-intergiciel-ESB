spring.application.name=analysis-api
server.port=8081

# gRPC – connexion vers sample-api (surchargée par variables d'environnement en Kubernetes)
sample.api.grpc.host=${SAMPLE_API_GRPC_HOST:localhost}
sample.api.grpc.port=${SAMPLE_API_GRPC_PORT:9090}

# Latence artificielle simulant le traitement en laboratoire (ms)
analysis.processing.delay-ms=${ANALYSIS_DELAY_MS:300}
